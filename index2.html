<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konya Enerji Zirvesi Fuarı 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --pink: #e91e63;
    --pink-bright: #ff3d7f;
    --blue-dark: #1a3a8a;
    --blue: #2d4eb8;
    --green: #2eb872;
    --green-lime: #c8e639;
    --orange: #ff5722;
    --teal: #1ab394;
    --white: #ffffff;
    --gray-light: #f5f5f5;
    --text-dark: #1a1a1a;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--white);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* ============ TOP NAVBAR ============ */
  .top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px 14px;
    background: var(--white);
    position: relative;
    z-index: 5;
  }

  .nav-menu {
    display: flex;
    list-style: none;
    gap: 0;
  }

  .nav-menu li {
    position: relative;
    padding: 0 22px;
  }

  .nav-menu li:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 16px;
    background: var(--pink);
    opacity: 0.5;
  }

  .nav-menu a {
    text-decoration: none;
    color: var(--pink);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }

  .nav-menu a:hover {
    color: var(--pink-bright);
  }

  .brand-logo {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1;
  }

  .brand-logo .energy {
    color: var(--pink);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 1px;
  }

  .brand-logo .next-tr {
    color: var(--green);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 1px;
  }

  /* ============ HERO SECTION ============ */
  .hero {
    position: relative;
    width: 100%;
    height: calc(100vh - 70px);
    min-height: 640px;
    overflow: visible;
  }

  .hero-image-wrapper {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }

  /* Background fair image */
  .hero-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* ====== LEFT side geometric shapes (decoration) ====== */
  .shape-group-left {
      position: absolute;
    left: 15%;
    top: 0%;
    width: 54%;
    height: 99%;
    z-index: 3;
    pointer-events: none;
  }

  .shape-group-left img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: left center;
  }

  /* Diagonal lines */
  .diagonal-lines {
    position: absolute;
    top: 0;
    left: 30%;
    width: 50%;
    height: 100%;
    z-index: 4;
    pointer-events: none;
  }

  .diagonal-lines svg {
    width: 100%;
    height: 100%;
  }

  /* ====== Right side: Logo block ====== */
  .logo-block {
    position: absolute;
    top: 0;
    right: 5%;
    z-index: 5;
    width: 360px;
  }

  .date-tag {
    position: relative;
    background: var(--blue-dark);
    clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
    padding: 30px 35px 40px;
    color: var(--white);
    margin-left: 30px;
  }

  /* notch top-right */
  .date-tag::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 60px;
    height: 30px;
    background: var(--pink);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 30% 100%, 0 70%);
  }

  .logo-konya {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    color: var(--white);
    line-height: 0.9;
  }

  .logo-konya .konya-top {
    font-size: 38px;
    letter-spacing: 4px;
    margin-bottom: 8px;
    display: block;
  }

  .logo-konya .word {
    display: block;
    font-size: 44px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .logo-konya .word.zirvesi {
    color: var(--white);
  }

  .logo-konya .fuari {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 44px;
  }

  .lightning {
    display: inline-block;
    color: var(--pink);
    font-weight: 900;
    transform: skew(-8deg);
  }

  .date-display {
    position: absolute;
    right: 25px;
    bottom: 30px;
    font-family: 'Barlow Condensed', sans-serif;
    color: var(--white);
    text-align: right;
    line-height: 1;
  }

  .date-display .dates {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .date-display .month {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .date-display .year {
    font-size: 22px;
    font-weight: 500;
    margin-top: 4px;
  }

  /* Slider dots */
  .slider-dots {
    position: absolute;
    bottom: -25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }

  .slider-dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
  }

  .slider-dots span.active {
    background: var(--white);
  }

  /* ====== Forms & Hotel block (overlapping shape) ====== */
  .info-block {
    position: absolute;
    top: -74px;
    right: 3%;
    z-index: 1000 !important;
    width: 420px;
    height: 600px;
  }

  .info-block-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .info-content {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    height: 100%;
    padding: 165px 40px;
    align-items: flex-end;
    gap: 20px;
  }

  .forms-list {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .form-link {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--white);
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
    line-height: 1.1;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .form-link:hover {
    transform: translateX(4px);
  }

  .form-link span {
    display: block;
  }

  .form-arrow {
    font-size: 24px;
    color: var(--white);
    margin-left: 4px;
  }

  .hotel-info {
    color: var(--white);
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .hotel-icon {
    font-size: 36px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .hotel-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1;
  }

  .hotel-city {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    margin-top: 4px;
  }

  .hotel-sub {
    font-size: 11px;
    font-weight: 400;
    margin-top: 6px;
    letter-spacing: 0.5px;
    opacity: 0.95;
  }

  /* ====== Bottom Bar ====== */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: var(--gray-light);
    z-index: 6;
    display: flex;
    align-items: center;
    padding-left: 60px;
  }

  .kaskon-logo {
    height: 85px;
  }


  /* ====== Animations ====== */
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-50px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(50px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .shape-group-left { animation: slideInLeft 1s ease-out 0.2s both; }
  .logo-block { animation: slideInRight 1s ease-out 0.3s both; }
  .info-block { animation: slideInRight 1s ease-out 0.5s both; }
  .diagonal-lines { animation: fadeIn 1.4s ease-out 0.6s both; }

  /* Responsive */
  @media (max-width: 1024px) {
    .nav-menu li { padding: 0 14px; }
    .nav-menu a { font-size: 14px; }
    .logo-block { width: 280px; }
    .logo-konya .word, .logo-konya .fuari { font-size: 34px; }
    .logo-konya .konya-top { font-size: 28px; }
    .info-block { width: 340px; top: 240px; }
  }

  @media (max-width: 768px) {
    .top-nav { flex-direction: column; gap: 14px; padding: 14px 20px; }
    .nav-menu { flex-wrap: wrap; justify-content: center; }
    .hero { height: auto; min-height: 100vh; }
    .shape-group-left { width: 60%; top: 5%; }
    .logo-block { position: relative; right: auto; width: 90%; margin: 20px auto; }
    .info-block { position: relative; right: auto; top: auto; width: 90%; margin: 20px auto; }
  }
</style>
</head>
<body>

<!-- TOP NAVIGATION -->
<nav class="top-nav">
  <ul class="nav-menu">
    <li><a href="#fuar">FUAR</a></li>
    <li><a href="#katilimci">KATILIMCI</a></li>
    <li><a href="#ziyaretci">ZİYARETÇİ</a></li>
    <li><a href="#basin">BASIN</a></li>
    <li><a href="#sponsorlar">SPONSORLAR</a></li>
    <li><a href="#iletisim">İLETİŞİM</a></li>
  </ul>
  <div class="brand-logo">
   <img src="images/kaskon-energy-next-turkiye.png" alt="">
  </div>
</nav>

<!-- HERO SECTION -->
<section class="hero">

  <!-- Background fair image (REPLACE) -->
  <div class="hero-image-wrapper">
    <img src="images/kaskon-slider-background-1.png" alt="Fuar alanı" class="hero-bg">
  </div>

  <!-- Left geometric shapes (REPLACE) -->
  <div class="shape-group-left">
    <img src="images/kaskon-sol-absolute-shapes.png" alt="">
  </div>

  <!-- Diagonal decorative lines -->
  <div class="diagonal-lines">
    <svg viewBox="0 0 600 700" preserveAspectRatio="none">
      <line x1="100" y1="0" x2="450" y2="700" stroke="white" stroke-width="2" opacity="0.85"/>
      <line x1="200" y1="0" x2="350" y2="700" stroke="white" stroke-width="2" opacity="0.85"/>
      <line x1="300" y1="0" x2="250" y2="700" stroke="white" stroke-width="2" opacity="0.85"/>
    </svg>
  </div>


  <!-- Info Block: Forms + Hotel (REPLACE the pink/lime shape) -->
  <div class="info-block">
    <img src="images/kaskon-ziyaretci-katilim-formu-buton.png" alt="" class="info-block-bg">
    <div class="info-content">
      <div class="forms-list">
        <a href="#ziyaretci-form" class="form-link">
          <span>ZİYARETÇİ<br>KATILIM<br>FORMU</span>
          <span class="form-arrow">›</span>
        </a>
        <a href="#katilimci-form" class="form-link">
          <span>KATILIMCI<br>FORMU</span>
        </a>
      </div>
     
    </div>
  </div>

  <!-- Bottom bar with KASKON logo (REPLACE) -->
  <div class="bottom-bar">
    <img src="images/kaskon-3e-footer-logo.png" alt="KASKON" class="kaskon-logo">
  </div>

</section>

<script>
  // Slider dots interaction
  const dots = document.querySelectorAll('.slider-dots span');
  let current = 0;
  setInterval(() => {
    dots.forEach(d => d.classList.remove('active'));
    current = (current + 1) % dots.length;
    dots[current].classList.add('active');
  }, 3500);

  // Smooth navigation hover effect
  document.querySelectorAll('.nav-menu a').forEach(link => {
    link.addEventListener('mouseenter', () => {
      link.style.letterSpacing = '1.5px';
    });
    link.addEventListener('mouseleave', () => {
      link.style.letterSpacing = '0.5px';
    });
  });

  // Form clicks (placeholder)
  document.querySelectorAll('.form-link').forEach(form => {
    form.addEventListener('click', (e) => {
      e.preventDefault();
      console.log('Form açılıyor:', form.textContent.trim());
    });
  });
</script>

</body>
</html>
